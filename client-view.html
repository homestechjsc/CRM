<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hồ Sơ Kỹ Thuật - HOMESTECH</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f8fafc; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%); }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        /* Tối ưu section title cho mobile */
        .section-title { 
            border-left: 4px solid #1e40af; 
            padding-left: 12px; 
            margin-bottom: 16px; 
            font-weight: 800; 
            color: #1e3a8a; 
            text-transform: uppercase; 
            font-size: 0.7rem; 
            letter-spacing: 0.05em; 
        }
    </style>
</head>
<body class="pb-12">
    <!-- Header Chuyên Nghiệp -->
    <div class="gradient-bg text-white pt-10 pb-20 px-6 rounded-b-[40px] shadow-2xl relative text-center sm:text-left">
        <div class="flex flex-col sm:flex-row items-center justify-between gap-4">
            <div>
                <p class="text-blue-100 text-[10px] font-bold uppercase tracking-[0.2em]">Hồ sơ kỹ thuật hệ thống</p>
                <h1 id="client-name" class="text-3xl font-black mt-1">...</h1>
            </div>
            <div class="bg-white/20 p-4 rounded-2xl glass-card hidden sm:block">
                <i class="fa-solid fa-shield-halved text-2xl"></i>
            </div>
        </div>
        <div id="client-info" class="text-blue-50/80 text-sm mt-4 flex flex-wrap justify-center sm:justify-start items-center gap-4">
            <!-- Thông tin khách hàng sẽ render tại đây -->
        </div>
    </div>

    <!-- Container Nội Dung -->
    <div class="max-w-md mx-auto px-5 -mt-12 space-y-8">
        
        <!-- THIẾT BỊ LẮP ĐẶT (Đã bổ sung hiển thị đầy đủ thông tin kỹ thuật) -->
        <section>
            <h3 class="section-title">Danh sách thiết bị lắp đặt</h3>
            <div id="list-devices" class="space-y-4">
                <!-- Logic JS sẽ render card thiết bị với đầy đủ IP, User, Pass tại đây -->
            </div>
        </section>

        <!-- TÀI KHOẢN & APP -->
        <section>
            <h3 class="section-title">Tài khoản ứng dụng & Truy cập</h3>
            <div id="list-accounts" class="space-y-3">
                <!-- Logic JS sẽ render card tài khoản tại đây -->
            </div>
        </section>

        <!-- SƠ ĐỒ HỆ THỐNG -->
        <section>
            <h3 class="section-title text-purple-800" style="border-color: #6b21a8;">Sơ đồ kỹ thuật & Mặt bằng</h3>
            <div id="list-diagrams" class="space-y-3">
                <!-- Logic JS sẽ render card sơ đồ tại đây -->
            </div>
        </section>

        <!-- Footer -->
<footer class="mt-16 border-t border-slate-200 pt-6 pb-4">
    <div class="max-w-5xl mx-auto px-4 text-center">

        

        <!-- Brand -->
        <p class="text-xs font-semibold text-slate-500 tracking-widest uppercase">
            Hệ thống quản lý bởi <span class="text-slate-700">HOMESTECH</span>
        </p>

        <!-- Support -->
        <p class="text-xs text-slate-400 mt-1">
            Hỗ trợ kỹ thuật:
            <a href="tel:0972023222" class="font-semibold text-blue-500 hover:underline">
                0972 023 222
            </a>
        </p>

        <!-- Divider -->
        <div class="my-3 h-px bg-gradient-to-r from-transparent via-slate-200 to-transparent"></div>

        <!-- Copyright -->
        <p class="text-[11px] text-slate-400">
            © 2026 Homestech. All rights reserved.
        </p>

    </div>
</footer>
    </div>

    <!-- Script xử lý lấy dữ liệu -->
    <script type="module" src="./client-logic.js"></script>
</body>
</html>
