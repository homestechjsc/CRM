<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hồ Sơ Kỹ Thuật - HOMESTECH</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f0fdf4; font-family: 'Inter', sans-serif; }
        /* Tone màu Emerald đồng bộ Admin */
        .gradient-bg { background: linear-gradient(135deg, #059669 0%, #10b981 100%); }
        .section-title { 
            border-left: 4px solid #059669; 
            padding-left: 12px; 
            margin-bottom: 16px; 
            font-weight: 800; 
            color: #064e3b; 
            text-transform: uppercase; 
            font-size: 0.75rem; 
            letter-spacing: 0.05em;
        }
        .device-card {
            background: white;
            border-radius: 24px;
            padding: 16px;
            border: 1px solid #ecfdf5;
            transition: all 0.3s ease;
        }
        /* Ưu tiên Inter, nếu lỗi sẽ dùng font hệ thống của iPhone/Android */
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
    
    * { 
        -webkit-tap-highlight-color: transparent; 
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
    }

    /* Khắc phục lỗi font tiếng Việt bị "chân phương" trên một số máy Android cũ */
    body {
        text-rendering: optimizeLegibility;
        -webkit-font-smoothing: antialiased;
    }
    </style>
</head>
<body class="pb-10">
    <header class="gradient-bg pt-10 pb-20 px-6 rounded-b-[40px] shadow-lg relative">
        <div class="max-w-5xl mx-auto flex justify-between items-start">
            <div>
                <h1 id="client-name" class="text-white text-2xl font-black mb-1">Đang tải...</h1>
                <p id="client-info" class="text-emerald-50 text-xs opacity-90"></p>
            </div>
            <div class="bg-white/20 p-3 rounded-2xl backdrop-blur-md">
                <i class="fa-solid fa-shield-halved text-white text-xl"></i>
            </div>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-4 -mt-10 space-y-8">
        <section>
            <h3 class="section-title">Hệ thống thiết bị</h3>
            <div id="list-devices" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                </div>
        </section>

        <section>
            <h3 class="section-title">Tài khoản & Ứng dụng</h3>
            <div id="list-accounts" class="space-y-3">
                </div>
        </section>

        <section>
            <h3 class="section-title">Sơ đồ kỹ thuật</h3>
            <div id="list-diagrams" class="grid grid-cols-2 gap-3">
                </div>
        </section>
    </main>

    <footer class="mt-12 text-center px-6">
        <p class="text-[10px] font-bold text-emerald-800 uppercase tracking-widest">Hệ thống được thiết lập bởi Homestech</p>
        <a href="tel:0972023222" class="inline-block mt-2 bg-emerald-100 text-emerald-700 px-4 py-2 rounded-full text-xs font-bold">
            <i class="fa-solid fa-headset mr-1"></i> Hỗ trợ: 0972 023 222
        </a>
    </footer>

    <script type="module" src="./client-logic.js"></script>
</body>
</html>
